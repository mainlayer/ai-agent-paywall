version: '3.9'

services:
  ai-agent-paywall:
    build: .
    image: ai-agent-paywall:latest
    container_name: ai-agent-paywall

    ports:
      - "${AGENT_PORT:-3000}:3000"

    environment:
      # Copy your .env values here, or use Docker secrets in production.
      # Never commit real API keys to source control.
      - MAINLAYER_API_KEY=${MAINLAYER_API_KEY}
      - MAINLAYER_RESOURCE_ID=${MAINLAYER_RESOURCE_ID}
      - AGENT_PORT=3000
      - AGENT_PRICE_USDC=${AGENT_PRICE_USDC:-0.01}
      - AGENT_SLUG=${AGENT_SLUG:-ai-summarizer-agent}
      - AGENT_NAME=${AGENT_NAME:-AI Summarizer Agent}
      - AGENT_DESCRIPTION=${AGENT_DESCRIPTION:-An AI agent that summarizes text on demand. Pay per call with Mainlayer.}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
